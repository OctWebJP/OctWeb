name: GitHub Pages Traffic Report

on:
  schedule:
    # Daily at 09:00 UTC (18:00 JST)
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate report and create issue
        env:
          # PAT with `repo` scope on org repos (needed for cross-repo traffic API).
          # Falls back to GITHUB_TOKEN (only works for this repo).
          GH_TRAFFIC_TOKEN: ${{ secrets.ORG_TRAFFIC_TOKEN || secrets.GITHUB_TOKEN }}
          GH_ISSUE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: OctWebJP
          ISSUE_REPO: ${{ github.repository }}
        run: python .github/scripts/pages_traffic_report.py
