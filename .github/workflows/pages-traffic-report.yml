name: Daily GitHub Pages Traffic Report

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate org-wide Pages traffic report and open issue
        env:
          # Traffic API requires `administration:read` — GITHUB_TOKEN cannot grant
          # this across the org, so a PAT is required. Create a fine-grained PAT
          # with Administration: Read on all OctWebJP repos + Issues: Read/Write
          # on OctWeb, then add it as a repo secret named PAGES_TRAFFIC_TOKEN.
          GH_TOKEN: ${{ secrets.PAGES_TRAFFIC_TOKEN }}
          ORG: OctWebJP
          ISSUE_REPO: OctWeb
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::PAGES_TRAFFIC_TOKEN secret is not set. The Traffic API needs a PAT with administration:read."
            exit 1
          fi
          python3 scripts/pages_traffic_report.py
