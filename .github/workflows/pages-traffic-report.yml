name: GitHub Pages Traffic Report

on:
  schedule:
    # Daily at 09:00 UTC (18:00 JST)
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  issues: write
  # `contents: write` grants push access, which the Traffic API requires.
  # Note: GITHUB_TOKEN only works for the repo the workflow runs in.
  # For cross-repo traffic in the org, set the ORG_TRAFFIC_TOKEN secret
  # to a PAT with `repo` scope (or a fine-grained token with
  # Administration: read on the target repos).
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate report and create issue
        env:
          # PAT with `repo` scope on org repos (needed for cross-repo traffic API).
          # Falls back to GITHUB_TOKEN (only works for this repo).
          GH_TRAFFIC_TOKEN: ${{ secrets.ORG_TRAFFIC_TOKEN || secrets.GITHUB_TOKEN }}
          GH_ISSUE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: OctWebJP
          ISSUE_REPO: ${{ github.repository }}
        run: python .github/scripts/pages_traffic_report.py
